name: Bug Report
about: Report a reproducible bug.
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Reproduced on latest main
      description: Make sure the issue is reproducible on the latest `main` branch.
      options:
        - label: I have reproduced this on the latest `main` branch.
          required: true

  - type: checkboxes
    attributes:
      label: Searched existing issues
      description: Search existing issues to avoid duplicates.
      options:
        - label: I have searched existing issues for duplicates.
          required: true

  - type: checkboxes
    attributes:
      label: Willing to contribute
      options:
        - label: I am willing to submit a pull request for this.

  - type: input
    attributes:
      label: OS
      placeholder: "e.g. Arch Linux 6.18, macOS 15.3"
    validations:
      required: true

  - type: input
    attributes:
      label: Compiler
      placeholder: "e.g. GCC 14.2, Clang 19"
    validations:
      required: true

  - type: input
    attributes:
      label: Qt version
      description: "Run `qmake6 --version`"
      placeholder: "e.g. 6.8.1"
    validations:
      required: true

  - type: input
    attributes:
      label: MuPDF version
      description: "Run `grep FZ_VERSION thirdparty/mupdf/include/mupdf/fitz/version.h`"
      placeholder: "e.g. 1.27.0"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a PDF with ...
        2. Press ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs / screenshots
      value: |
        ```

        ```
    validations:
      required: true
