name: Feature Request
about: Suggest a new feature or enhancement.
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues for duplicates.
          required: true

  - type: textarea
    attributes:
      label: Problem
      description: What limitation or pain point does this address?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered
    validations:
      required: false
