name: Sync from Codeberg

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Fetch Codeberg SSOT
        run: |
          git remote add codeberg https://codeberg.org/lektra/lektra.git
          git fetch codeberg

      - name: Reset to Codeberg main
        run: git reset --hard codeberg/main

      - name: Push
        run: git push --force-with-lease origin main
