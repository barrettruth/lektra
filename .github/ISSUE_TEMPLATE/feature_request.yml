name: Feature Request
description: Suggest a new feature or enhancement.
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues for duplicates.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or pain point does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
